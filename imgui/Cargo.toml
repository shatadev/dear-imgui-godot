[package]
name = "godot_imgui_rust"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
godot = { version = "0.5.3", git = "https://github.com/godot-rust/gdext", branch = "master", features = [
    "api-custom",
    "experimental-wasm",
    "lazy-function-tables",
] }

[features]
nothreads = ["godot/experimental-wasm-nothreads"]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
