name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  # Keep in sync with imgui/Makefile nightly. Known working
  RUST_NIGHTLY: nightly-2026-06-19

# TODO: Consider reverting to API custom instead of 4.7
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-19
          components: rust-src

      # rust-cache does not read .cargo/config.toml. point it at the real
      # target-dir (/addons/godot-imgui-rust/target).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: imgui -> ../addons/godot-imgui-rust/target
          key: native-linux

      - name: Build editor + release
        working-directory: imgui
        run: make native

      - uses: actions/upload-artifact@v4
        with:
          name: lib-linux-x86_64
          if-no-files-found: error
          path: |
            addons/godot-imgui-rust/target/editor/libgodot_imgui_rust.so
            addons/godot-imgui-rust/target/release/libgodot_imgui_rust.so

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-19
          components: rust-src

      # imgui-sys may run bindgen over cimgui headers; provide libclang so it resolves.
      - uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: imgui -> ../addons/godot-imgui-rust/target
          key: native-windows

      # Direct cargo (make isn't reliably present on Windows runners). MSVC cl.exe
      # (preinstalled) is found automatically by the cc crate for the imgui C++ build.
      - name: Build editor + release
        working-directory: imgui
        shell: pwsh
        run: |
          cargo +$env:RUST_NIGHTLY build --profile editor --features editor-docs
          cargo +$env:RUST_NIGHTLY build --release

      - uses: actions/upload-artifact@v4
        with:
          name: lib-windows-x86_64
          if-no-files-found: error
          path: |
            addons/godot-imgui-rust/target/editor/godot_imgui_rust.dll
            addons/godot-imgui-rust/target/release/godot_imgui_rust.dll

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-19
          components: rust-src
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: imgui -> ../addons/godot-imgui-rust/target
          key: native-macos

      - name: Build universal editor + release
        working-directory: imgui
        shell: bash
        run: |
          set -euo pipefail
          # cargo --target writes to target/<triple>/ only; create the bare dirs lipo writes into.
          mkdir -p ../addons/godot-imgui-rust/target/editor ../addons/godot-imgui-rust/target/release
          # editor (release-optimized + editor-docs)
          cargo +"$RUST_NIGHTLY" build --profile editor --features editor-docs --target x86_64-apple-darwin
          cargo +"$RUST_NIGHTLY" build --profile editor --features editor-docs --target aarch64-apple-darwin
          lipo -create -output ../addons/godot-imgui-rust/target/editor/libgodot_imgui_rust.dylib \
            ../addons/godot-imgui-rust/target/x86_64-apple-darwin/editor/libgodot_imgui_rust.dylib \
            ../addons/godot-imgui-rust/target/aarch64-apple-darwin/editor/libgodot_imgui_rust.dylib
          # release
          cargo +"$RUST_NIGHTLY" build --release --target x86_64-apple-darwin
          cargo +"$RUST_NIGHTLY" build --release --target aarch64-apple-darwin
          lipo -create -output ../addons/godot-imgui-rust/target/release/libgodot_imgui_rust.dylib \
            ../addons/godot-imgui-rust/target/x86_64-apple-darwin/release/libgodot_imgui_rust.dylib \
            ../addons/godot-imgui-rust/target/aarch64-apple-darwin/release/libgodot_imgui_rust.dylib
          lipo -info ../addons/godot-imgui-rust/target/release/libgodot_imgui_rust.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: lib-macos-universal
          if-no-files-found: error
          path: |
            addons/godot-imgui-rust/target/editor/libgodot_imgui_rust.dylib
            addons/godot-imgui-rust/target/release/libgodot_imgui_rust.dylib

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-19
          components: rust-src # required for -Zbuild-std
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: imgui -> ../addons/godot-imgui-rust/target
          key: wasm

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.20
          actions-cache-folder: emsdk-cache-4.0.20

      - name: Sanity check toolchains
        run: emcc -v && em++ -v

      - name: Build release wasm (threaded + nothreads)
        working-directory: imgui
        run: make wasm-release

      - uses: actions/upload-artifact@v4
        with:
          name: lib-wasm
          if-no-files-found: error
          path: |
            addons/godot-imgui-rust/target/wasm32-unknown-emscripten/release/godot_imgui_rust.threads.wasm
            addons/godot-imgui-rust/target/wasm32-unknown-emscripten/release/godot_imgui_rust.wasm

  package:
    needs: [linux, windows, macos, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          path: dist

      - name: Assemble addon target tree
        run: |
          set -euo pipefail
          base=addons/godot-imgui-rust/target
          mkdir -p "$base/editor" "$base/release" "$base/wasm32-unknown-emscripten/release"
          for job in lib-linux-x86_64 lib-windows-x86_64 lib-macos-universal; do
            cp -v "dist/$job/editor/"*  "$base/editor/"
            cp -v "dist/$job/release/"* "$base/release/"
          done
          cp -v dist/lib-wasm/*.wasm "$base/wasm32-unknown-emscripten/release/"
          ls -R "$base"

      - uses: actions/upload-artifact@v4
        with:
          name: godot-imgui-rust
          if-no-files-found: error
          path: |
            addons/godot-imgui-rust/godot-imgui-rust.gdextension
            addons/godot-imgui-rust/godot-imgui-rust.gdextension.uid
            addons/godot-imgui-rust/plugin.cfg
            addons/godot-imgui-rust/plugin.gd
            addons/godot-imgui-rust/plugin.gd.uid
            addons/godot-imgui-rust/imgui_api.tscn
            addons/godot-imgui-rust/target/editor/libgodot_imgui_rust.so
            addons/godot-imgui-rust/target/release/libgodot_imgui_rust.so
            addons/godot-imgui-rust/target/editor/godot_imgui_rust.dll
            addons/godot-imgui-rust/target/release/godot_imgui_rust.dll
            addons/godot-imgui-rust/target/editor/libgodot_imgui_rust.dylib
            addons/godot-imgui-rust/target/release/libgodot_imgui_rust.dylib
            addons/godot-imgui-rust/target/wasm32-unknown-emscripten/release/godot_imgui_rust.threads.wasm
            addons/godot-imgui-rust/target/wasm32-unknown-emscripten/release/godot_imgui_rust.wasm
